model:
  wandb:
    project: "BraTS_Segmentation_2D"
    sweep_config:
      method: bayes
      early_terminate:
        type: hyperband
        min_iter: 5          # don't kill anything before 5 validation checks
        eta: 3                # bracket reduction factor (default 3, higher = more aggressive)
      metric:
        name: val_mean_dice
        goal: maximize
      parameters:
        lr:
          values: [0.0001, 0.0004, 0.0008, 0.001, 0.005]
        weight_decay:
          min: 0.0001
          max: 0.01
          distribution: log_uniform_values
        dice_weight:
          values: [0.3, 0.5, 0.7, 0.8]
        lr_patience:
          values: [3, 5, 8]
        gradient_clip_val:
          values: [0.1, 0.5, 1.0]
        scale:
          values: [0.8, 0.9, 1.0]
        rotate:
          values: [5, 10, 15]

  checkpoint_strategy:
    monitor: "val_mean_dice"
    mode: "max"
    save_last: True
    save_top_k: 4
    early_stopping: 
       patience: 5

  training:
    seed: 1234
    in_channels: 4
    devices: 1
    val_metric: "mean_dice"
    strategy: "auto"
    accelerator: "gpu"
    deterministic: False
    precision: "16-mixed"
    limit_train_batches: 1.0
    limit_val_batches: 1.0
    ckpt_path: "/workspace/brats/Output/last.ckpt"
      

  optimizer:
    lr: 0.0004
    dice_weight: 0.8
    factor: 0.5
    patience: 8
    threshold: 0.0001
    weight_decay: 0.000956                           # https://towardsdatascience.com/weight-decay-and-its-peculiar-effects-66e0aee3e7b8/
    gradient_accumulation_steps: 1
    gradient_clip_val : 0.1
    num_train_epochs: 100
    num_tuning_epochs: 15

  profiler:
    dirpath: "/workspace/brats/Output/Profiler"
    filename: "profiler.txt"
    line_count_restriction: 0.2


dataset: 
  inp_root_dir: "/workspace/brats/dataset"
  out_root_dir: "/workspace/brats/Output"
  metadata_dir: "/workspace/brats/dataset/Processed/slice_metadata.json"

  dataloader:
    num_workers: 4
    pin_memory: True
    trn_batch_sz: 32
    val_batch_sz: 32
    prefetch_factor: 4
    persistent_workers: True    
    label2id: {"background": 0, "WT": 1, "TC": 2, "ET": 3}
    id2label: {0: "background", 1: "WT", 2: "TC", 3: "ET"}
  
  augmentations:
    horizontal_flip: 
      prob: 0.5
    
    rotate:
      prob: 0.5
      limit: 5
    
    affine:
      scale: 0.8
      translate_percent: 0.05
      prob: 0.5

    brightness:
      brightness_limit: 0.1
      contrast_limit: 0.1
      prob: 0.3
    
    resize:
      tgt_img_sz: 256
    
      
    

